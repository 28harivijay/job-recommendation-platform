{% extends 'base.html' %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow-lg p-4 col-12 col-md-10 col-lg-8">
        <div class="card-body">

            <h2 class="card-title mb-4 text-center">Upload Your File</h2>

            <form action="/upload" method="post" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label for="formFileLg" class="form-label">Select a file from your device</label>
                    <input class="form-control form-control-lg" id="formFileLg" type="file" name="file">
                </div>

                <!-- Dataset info instead of comment box -->
                <div class="alert alert-light border">
                    <strong>Supported File Types</strong>
                    <ul class="mb-0 mt-2">
                        <li>.csv</li>
                        <li>.xlsx</li>
                    </ul>
                    <small class="text-muted">
                        Upload a dataset to automatically analyze your CSV or Excel data.
                    </small>
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-lg">
                        Analyze Dataset
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>
{% endblock %}
